<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StaTech | God Mode Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">

    <nav class="admin-nav">
        <div class="admin-logo">
            <i class="fas fa-user-shield"></i> STATech <span class="gold-text">GOD MODE</span>
        </div>
        <div class="stats-bar">
            <div class="stat-item">Queue: <b id="pending-count">0</b></div>
            <div class="stat-item">Revenue: <b id="total-revenue">$0</b></div>
            <button class="exit-admin" onclick="location.href='index.html'">EXIT SYSTEM</button>
        </div>
    </nav>

    <main class="admin-dashboard-layout">
        
        <aside class="admin-sidebar">
            <div class="sidebar-label">FILTERS</div>
            <button class="admin-tab active" onclick="filterAdmin('all')">
                <i class="fas fa-layer-group"></i> All Requests
            </button>
            <button class="admin-tab" onclick="filterAdmin('mall')">
                <i class="fas fa-store"></i> Musha Mall
            </button>
            <button class="admin-tab" onclick="filterAdmin('lot')">
                <i class="fas fa-car"></i> Auto Lot
            </button>
            
            <div class="sidebar-footer">
                <p>Musha System v2.0</p>
                <small>Secure Admin Node</small>
            </div>
        </aside>

        <section class="verification-desk">
            <div class="section-header">
                <div class="header-title">
                    <h3><i class="fas fa-clipboard-check"></i> VERIFICATION DESK</h3>
                    <p>Security Check: Approve or Reject submissions</p>
                </div>
            </div>
            
            <div id="admin-pending-list" class="admin-grid">
                <div class="admin-placeholder">
                    <i class="fas fa-sync fa-spin"></i>
                    <p>Scanning local vault for submissions...</p>
                </div>
            </div>
        </section>
        
    </main>

   <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js"></script>

    <script src="admin.js"></script>
    <script src="main.js"></script>
</body>
</html>
