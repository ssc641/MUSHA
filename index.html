<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSHA | Welcome Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="musha-header">
    <img src="musha-logo.png" alt="Musha Logo" class="main-logo">
    <h1 class="brand-name">MUSHA</h1>
    <p class="tagline">Your Gateway to Gweru's Best</p>
</header>
    <div class="musha-container">
        <!-- Left Side: Furniture -->
        <div class="portal-section mall-bg" onclick="location.href='mall.html'">
            <div class="portal-content">
                <h1>SSC GRAND MALL</h1>
                <p>Luxury Furniture & Interior Design</p>
                <button class="portal-btn">Enter Showroom</button>
            </div>
        </div>

        <!-- Right Side: Cars -->
        <div class="portal-section auto-bg" onclick="location.href='auto.html'">
            <div class="portal-content">
                <h1>SSC AUTOMOTIVE</h1>
                <p>Verified Quality Second-Hand Vehicles</p>
                <button class="portal-btn">View Dealership</button>
            </div>
        </div>
    </div>
</body>
</html>
