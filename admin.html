<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StaTech | God Mode Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">

    <nav class="admin-nav">
        <h2>STATech <span class="gold-text">GOD MODE</span></h2>
        <div class="stats-bar">
            <span>Pending: <b id="pending-count">0</b></span>
            <span>Total Sales: <b id="total-revenue">$0</b></span>
        </div>
    </nav>

    <main class="admin-dashboard">
        <section class="verification-desk">
            <h3><i class="fas fa-shield-alt"></i> Verification Desk</h3>
            <p>New listings requiring your approval:</p>
            
            <div id="pending-list" class="admin-grid">
                </div>
        </section>
    </main>

    <script src="main.js"></script>
    <script src="furniture.js"></script>
    <script src="auto.js"></script>
</body>
</html>
