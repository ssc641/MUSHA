<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Grand Mall | Musha Premium Logistics</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Force White Background for the glitch */
        .app-body {
            background-color: white !important;
            margin-top: 50px; /* Space for the top nav */
        }

        /* The Door Overlay */
        #gateway-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('1000142249.png') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            transition: opacity 0.5s ease;
        }

        .gateway-content {
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            color: white;
            max-width: 80%;
        }

        /* Professional Buttons */
        .action-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            display: inline-block;
        }

        #open-btn { background: #d4af37; color: black; }

        /* Top Navigation Bar */
        .top-nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: #fff;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 2000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-item {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body class="app-body">

    <nav class="top-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home" style="margin-right:5px;"></i> HOME</a>
        <a href="auto.html" class="nav-item"><i class="fas fa-car" style="margin-right:5px;"></i> AUTO</a>
        <a href="sell.html" class="nav-item" style="color: #28a745;"><i class="fas fa-plus-circle" style="margin-right:5px;"></i> SELL</a>
    </nav>

    <div id="gateway-overlay">
        <div class="gateway-content">
            <img src="1000141369.png" alt="Musha Logo" style="width: 80px; margin-bottom: 10px;">
            <h1 class="brand-name">MUSHA</h1>
            <h2>WELCOME TO THE MALL</h2>
            <p>Your Home, Our Home.</p>
            <button id="open-btn" class="action-btn" onclick="openTheMall()">ENTER SHOWROOM</button>
            <button class="action-btn" onclick="location.href='auto.html'">AUTO DEALERSHIP</button>
        </div>
    </div>

    <button class="menu-toggle" id="menu-toggle-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <nav class="side-bar" id="mall-sidebar">
        <button class="close-sidebar" onclick="toggleSidebar()">&times;</button>
        <div class="logo">SSC GRAND MALL</div>
        <div class="cart-status" onclick="location.href='cart.html'">
            <i class="fas fa-shopping-bag"></i> 
            MY CART: <span id="cart-count-display">0</span>
        </div>
        <div class="tabs">
            <button class="tab-btn active" id="tab-premium" onclick="showFurnitureSection('premium')">Premium</button>
            <button class="tab-btn" id="tab-standard" onclick="showFurnitureSection('standard')">Standard</button>
        </div>
        <ul class="sections">
            <li onclick="filterFurnitureByRoom('Appliances')"><i class="fas fa-plug"></i> Home Appliances</li>
            <li onclick="filterFurnitureByRoom('Living Room')"><i class="fas fa-couch"></i> Lounge & Living</li>
            <li onclick="filterFurnitureByRoom('Bedroom')"><i class="fas fa-bed"></i> Bedroom Suite</li>
            <li onclick="filterFurnitureByRoom('Kitchen')"><i class="fas fa-utensils"></i> Kitchen & Dining</li>
            <li onclick="filterFurnitureByRoom('Office')"><i class="fas fa-briefcase"></i> Office & Study</li>
            <li onclick="filterFurnitureByRoom('Outdoor')"><i class="fas fa-tree"></i> Outdoor Living</li>
        </ul>
    </nav>

    <main class="lobby-container" id="main-content">
        <div class="fountain-wrapper" id="lobby-view">
            <img src="assets/lobby_v2.png" class="main-img" usemap="#mallmap" alt="SSC Grand Mall Lobby">
            <map name="mallmap">
                <area shape="rect" coords="0,0,300,1000" href="javascript:void(0)" onclick="showFurnitureSection('standard')">
                <area shape="rect" coords="700,0,1000,1000" href="javascript:void(0)" onclick="showFurnitureSection('premium')">
                <area shape="circle" coords="500,600,150" href="javascript:void(0)" onclick="location.href='auto.html'">
            </map>
        </div>
        <div id="furniture-results-grid" class="car-grid" style="display:none;"></div>
    </main>

    <script>
        function openTheMall() {
            document.getElementById('gateway-overlay').style.display = 'none';
        }
    </script>

    <script src="furniture.js"></script> 
    <script src="main.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>
  </body>
</html>
