<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StaTech | God Mode Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">

    <nav class="admin-nav">
        <div class="admin-logo">
            <i class="fas fa-user-shield"></i> STATech <span class="gold-text">GOD MODE</span>
        </div>
        <div class="stats-bar">
            <div class="stat-item">Pending: <b id="pending-count">0</b></div>
            <div class="stat-item">Total Sales: <b id="total-revenue">$0</b></div>
            <button class="exit-admin" onclick="location.href='index.html'">Exit</button>
        </div>
    </nav>

    <main class="admin-dashboard">
        
        <aside class="admin-sidebar">
            <button class="admin-tab active" onclick="filterAdmin('all')">All Requests</button>
            <button class="admin-tab" onclick="filterAdmin('furniture')">Furniture</button>
            <button class="admin-tab" onclick="filterAdmin('auto')">Automotive</button>
        </aside>

        <section class="verification-desk">
            <div class="section-header">
                <h3><i class="fas fa-clipboard-check"></i> Verification Desk</h3>
                <p>Approve or Reject new listings for Musha & StaTech Auto</p>
            </div>
            
            <div id="pending-list" class="admin-grid">
                <div class="admin-placeholder">Scanning for new submissions...</div>
            </div>
        </section>
        
    </main>

    <script src="main.js"></script>

        <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

    <script src="firebase-config.js"></script>

    <script src="main.js"></script>

  </body>
</html>

    </body>
</html>
