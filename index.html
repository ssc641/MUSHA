<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSHA | Your Gateway to Gweru's Best</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* This makes the background look professional and cleans up the buttons */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a; /* Sleek dark background for the main gate */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gateway-overlay {
            width: 100%;
            max-width: 500px;
            text-align: center;
            padding: 20px;
        }

        .musha-logo-container img {
            width: 120px; /* Makes your green house logo stand out */
            margin-bottom: 10px;
        }

        .brand-name {
            letter-spacing: 4px;
            font-size: 2.5rem;
            margin: 0;
            color: #ffffff;
        }

        .tagline {
            color: #888;
            margin-bottom: 40px;
        }

        .gateway-choices {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .choice-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 15px;
            transition: 0.3s ease;
        }

        .choice-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            border-color: #d4af37; /* Gold glow on hover */
        }

        .gold-text {
            color: #d4af37; /* Premium Gold */
            margin-top: 0;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        /* Fixing the "s***" buttons */
        .enter-btn {
            background: #d4af37;
            color: black;
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
        }

        .enter-btn:hover {
            background: #ffffff;
            letter-spacing: 2px;
        }

        .gateway-footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div id="gateway-overlay">
        
        <header class="gateway-header">
            <div class="musha-logo-container">
                <img src="1000141369.png" alt="Musha Logo" class="musha-icon-img">
            </div>
            <h1 class="brand-name">MUSHA</h1>
            <p class="tagline">Your Gateway to Gweru's Best</p>
        </header>

        <main class="gateway-choices">
            
            <section class="choice-card">
                <h2 class="gold-text">SSC GRAND MALL</h2>
                <p>Luxury Furniture & Interior Design</p>
                <a href="mall.html">
                    <button class="enter-btn">Enter Showroom</button>
                </a>
            </section>

            <section class="choice-card">
                <h2 class="gold-text" style="color: #28a745;">SSC AUTOMOTIVE</h2>
                <p>Verified Quality Second-Hand Vehicles</p>
                <a href="auto.html">
                    <button class="enter-btn" style="background: #28a745; color: white;">View Dealership</button>
                </a>
            </section>

        </main>

        <footer class="gateway-footer">
            <p>&copy; 2026 StaTech Digital Agency</p>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="main.js"></script>

  </body>
</html>
