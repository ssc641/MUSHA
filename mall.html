<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC Grand Mall | Premium Furniture Logistics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="app-body"> <!-- Added class to help Sidebar/Lobby layout -->

    <!-- 1. The Gateway Overlay (Entrance) -->
    <div id="gateway-overlay">
        <div class="gateway-content">
            <h1 class="brand-name">MUSHA</h1> <!-- Added brand name for consistency -->
            <h2>WELCOME TO THE MALL</h2>
            <button id="open-btn" onclick="openTheMall()">ENTER SHOWROOM</button>
        </div>
    </div>

    <!-- 2. The Interactive Showroom Sidebar -->
    <nav class="side-bar">
        <div class="logo">SSC GRAND MALL</div>
        
        <div class="tabs">
            <button class="tab-btn active">Premium Quality</button>
            <button class="tab-btn">Standard Quality</button>
        </div>

        <ul class="sections">
            <li>Lounge & Living</li>
            <li>Bedroom Suite</li>
            <li>Office & Study</li>
            <li>Kitchen & Dining</li>
            <li>Outdoor Living</li>
        </ul>

        <div class="logistics-tag">
            <p>SSC Logistics: Delivery Guaranteed</p>
        </div>
    </nav>

    <!-- 3. The Main Visual Lobby -->
    <main class="lobby-container">
        <div class="fountain-wrapper">
            <!-- The Master Image -->
            <img src="assets/lobby_v2.png" class="main-img" usemap="#mallmap" alt="SSC Grand Mall Lobby">

            <!-- Clickable hotspots -->
            <map name="mallmap">
                <area shape="rect" coords="0,0,300,1000" href="#" onclick="showSection('standard')" alt="Standard Furniture">
                <area shape="rect" coords="700,0,1000,1000" href="#" onclick="showSection('premium')" alt="Premium Furniture">
                <area shape="circle" coords="500,600,150" href="#" onclick="showSection('logistics')" alt="SSC Logistics">
            </map>
        </div>
    </main>

    <script src="main.js"></script>

</body>
</html>
